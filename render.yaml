services:
  - type: web
    name: extremadura-sin-prisas-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install .
    preDeployCommand: alembic -c alembic.ini upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: COMMON_PASSPORT_QR_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
